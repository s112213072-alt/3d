<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS Viewer - Select</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; margin: 0; }
        select { padding: 10px; font-size: 16px; margin-bottom: 20px; border-radius: 5px; outline: none; border: 1px solid #ccc; }
        .viewerContainer { 
            width: 100%; max-width: 600px; height: 500px; margin: 0 auto; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 8px; 
            overflow: hidden; background: white; image-rendering: pixelated; 
        }
        babylon { width: 100%; height: 100%; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0366d6; font-weight: bold; }
    </style>
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    <script>
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ 返回首頁</a>
    <h2>Babylon Viewer - 切換模型</h2>
    <select onchange="loadit(this.value)">
        <option value="">-- 請選擇模型 --</option>
        <option value="./models/alice.glb">Alice</option>
        <option value="./models/Astronaut.glb">Astronaut</option>
        <option value="./models/stacy_lightweight.glb">Stacy</option>
        <option value="./models/ot.glb">ot</option>
    </select>
    <div class='viewerContainer'>
        <babylon id="viewerID"></babylon>
    </div>
</body>
</html>
